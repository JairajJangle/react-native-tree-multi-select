name: Setup
description: Setup Node.js and install dependencies

runs:
  using: composite
  steps:
    # Enable Corepack BEFORE setup-node so that its internal yarn
    # diagnostics use the Corepack-managed yarn instead of the
    # global 1.x which refuses to run when packageManager is set.
    - name: Enable Corepack
      run: corepack enable
      shell: bash

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version-file: .nvmrc

    # Re-enable Corepack for the newly installed Node version
    - name: Setup Corepack and Yarn
      run: |
        corepack enable
        corepack prepare yarn@4.9.2 --activate
        yarn --version
      shell: bash

    - name: Configure Yarn
      run: |
        yarn config set nodeLinker node-modules
        yarn config set nmHoistingLimits workspaces
      shell: bash

    - name: Restore Yarn Cache
      uses: actions/cache/restore@v5
      id: yarn-cache
      with:
        path: |
          **/node_modules
          .yarn/cache
          .yarn/unplugged
          .yarn/install-state.gz
        key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}-${{ hashFiles('**/package.json', '!node_modules/**') }}
        restore-keys: |
          ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          ${{ runner.os }}-yarn-

    - name: Install dependencies
      run: yarn install
      shell: bash

    - name: Save Yarn Cache
      uses: actions/cache/save@v5
      if: steps.yarn-cache.outputs.cache-hit != 'true'
      with:
        path: |
          **/node_modules
          .yarn/cache
          .yarn/unplugged
          .yarn/install-state.gz
        key: ${{ steps.yarn-cache.outputs.cache-primary-key }}