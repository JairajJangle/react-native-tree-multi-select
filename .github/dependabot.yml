version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    # Group all dependency updates into a single PR to reduce noise
    groups:
      all-dependencies:
        patterns:
          - "*"
    # Only open PRs for security updates, not routine version bumps
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      all-actions:
        patterns:
          - "*"
