name: CI
on:
  push:
    branches:
      - main
      - beta
  pull_request:
    branches:
      - main
      - beta
  merge_group:
    types:
      - checks_requested

env:
  NODE_OPTIONS: --experimental-vm-modules

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint files
        run: yarn lint

      - name: Typecheck files
        run: yarn typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run unit tests
        run: yarn test:cov

      - name: Update Coverage Badge
        # Self-contained replacement for we-cli/coverage-badge-action, which
        # pulls in Node 20-based actions (Wandalen/wretry.action, checkout@v3)
        # that GitHub Actions runners are deprecating. Renders
        # badges/coverage.svg onto gh-pages; the README badge reads it from
        # raw.githubusercontent.com.
        # GitHub actions: default branch variable
        # https://stackoverflow.com/questions/64781462/github-actions-default-branch-variable
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          COV=$(node -p 't=require(`./coverage/coverage-summary.json`).total,Math.min(...`lines|statements|functions|branches`.split(`|`).map(k=>t[k].pct))')
          COLOR=$(node -p "$COV >= 95 ? 'green' : 'orange'")
          npm i -g badgen-cli
          badgen -j coverage -s "$COV%" -c "$COLOR" > "$RUNNER_TEMP/coverage.svg"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          # Retry the push a few times in case a concurrent run lands in between.
          for attempt in 1 2 3; do
            git reset --hard origin/gh-pages
            mkdir -p badges
            cp "$RUNNER_TEMP/coverage.svg" badges/coverage.svg
            git add badges/coverage.svg
            # No diff (coverage % unchanged) -> nothing to push, done.
            git commit -m "Update badges [skip ci]" || break
            git push && break
            git fetch origin gh-pages
            sleep 2
          done

  build-library:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup
        uses: ./.github/actions/setup

      - name: Install missing dependencies
        run: yarn add -D @ark/schema || echo "Package already installed or not needed"

      - name: Build package
        run: yarn prepare

  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup
        uses: ./.github/actions/setup

      - name: Prepare library
        run: yarn prepare

      - name: Build example for Web
        run: |
          yarn example expo export --platform web

  publish-npm:
    needs: [lint, test, build-library, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write # To publish a GitHub release
      issues: write # To comment on released issues
      pull-requests: write # To comment on released pull requests
      id-token: write # To enable use of OIDC for npm provenance
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta'
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # Ensures all tags are fetched

      - name: Setup
        uses: ./.github/actions/setup

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"

      - name: Release
        run: npx semantic-release # Run semantic-release to manage versioning and publishing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
    